<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEA</title>
<style>
  :root {
    --green: #1dc262; --green2: #17a854; --bg: #000; --text: #eaffea; --muted: #6b8f78;
    --danger: #e05a5a; --panel: #0a0a0a; --line: #173b25; --active: #174b2b; --global-color: #2196f3;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: Arial, sans-serif;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; padding: 10px;
  }
  .app { width: 100%; max-width: 850px; margin-top: 10px; display: flex; flex-direction: column; height: 90vh; }
  h1 { text-align: center; font-size: 24px; letter-spacing: 3px; margin-bottom: 15px; color: var(--green); }
  
  .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 18px; text-align: center; max-width: 400px; margin: 50px auto 0 auto; width: 100%; }
  label { display: block; font-size: 11px; color: var(--green); font-weight: bold; margin-bottom: 6px; text-transform: uppercase; }
  input[type=text] {
    width: 100%; background: #050505; color: var(--green); border: 1px solid var(--line);
    border-radius: 4px; padding: 12px; font-size: 14px; margin-bottom: 6px; font-family: monospace; outline: none;
  }
  .action-btn { width: 100%; background: var(--green); color: #000; border: none; padding: 14px; border-radius: 5px; font-weight: bold; font-size: 15px; cursor: pointer; }
  
  /* Layout Split */
  .chat-wrapper { display: flex; flex: 1; background: var(--panel); border: 1px solid var(--line); border-radius: 8px; overflow: hidden; height: 100%; }
  
  /* Barra Lateral */
  .sidebar { width: 240px; border-right: 1px solid var(--line); display: flex; flex-direction: column; background: #040404; }
  .global-tab { padding: 12px; margin: 5px; background: #0e1e14; border: 1px dashed var(--green); border-radius: 4px; text-align: center; font-weight: bold; cursor: pointer; font-size: 13px; color: var(--green); }
  .global-tab.selected { background: var(--active); border-style: solid; color: #fff; }
  .search-box { padding: 8px 5px; border-bottom: 1px solid var(--line); margin: 0 5px; }
  .search-box input { padding: 8px; font-size: 12px; margin-bottom: 0; }
  .user-list { flex: 1; overflow-y: auto; padding: 5px; display: flex; flex-direction: column; gap: 4px; }
  .user-item { padding: 10px; border-radius: 4px; font-size: 13px; cursor: pointer; word-break: break-all; border: 1px solid transparent; }
  .user-item:hover { background: var(--line); }
  .user-item.selected { background: var(--active); border-color: var(--green); color: #fff; font-weight: bold; }
  
  /* Área Principal do Chat */
  .main-chat { flex: 1; display: flex; flex-direction: column; background: var(--panel); }
  .chat-header { padding: 12px; border-bottom: 1px solid var(--line); font-size: 14px; color: var(--green); font-family: monospace; background: #040404; }
  .chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
  
  .msg { max-width: 80%; padding: 8px 12px; border-radius: 8px; font-size: 13.5px; word-wrap: break-word; line-height: 1.4; }
  .msg.me { align-self: flex-end; background: var(--green); color: #000; }
  .msg.them { align-self: flex-start; background: var(--line); color: var(--green); }
  .msg.global-type { border-left: 3px solid var(--global-color); }
  .msg.system { align-self: center; background: transparent; color: var(--muted); font-size: 11px; font-family: monospace; }

  .send-row { padding: 10px; display: flex; gap: 8px; border-top: 1px solid var(--line); background: #040404; }
  .send-btn { background: var(--green); color: #000; border: none; padding: 0 20px; border-radius: 4px; font-weight: bold; cursor: pointer; }
  
  .hidden { display: none !important; }
  .status-bar { font-size: 11px; text-align: center; padding: 6px; color: var(--muted); font-family: monospace; border-top: 1px solid var(--line); }
</style>
</head>
<body>
<div class="app">
  <h1>PEA</h1>

  <!-- LOGIN -->
  <div id="screenJoin" class="panel">
    <label>Seu Nickname aqui:</label>
    <input type="text" id="usernameInput" maxlength="20" placeholder="Ex: Usuário#123...">
    <div id="loginError" style="color: var(--danger); font-size: 12px; margin-bottom: 10px; min-height: 15px;"></div>
    <button class="action-btn" id="btnEnter">Entrar no Sistema</button>
  </div>

  <!-- CONTAINER PRINCIPAL -->
  <div id="screenFeed" class="chat-wrapper hidden">
    <!-- BARRA LATERAL -->
    <div class="sidebar">
      <!-- Aba Fixa do Feed Global -->
      <div class="global-tab" id="tabGlobal">CHAT GLOBAL</div>
      
      <div class="search-box">
        <input type="text" id="searchUser" placeholder="Filtrar usuários...">
      </div>
      <div class="user-list" id="usersContainer"></div>
      <div class="status-bar" id="statusText">Conectando...</div>
    </div>

    <!-- CHAT BOX -->
    <div class="main-chat">
      <div class="chat-header" id="chatTargetHeader">Selecione uma aba ou usuário na lateral</div>
      <div class="chat-box" id="chatBox"></div>
      <div class="send-row">
        <input type="text" id="msgInput" maxlength="1500" placeholder="Selecione um chat..." disabled>
        <button class="send-btn" id="btnSend" disabled>Enviar</button>
      </div>
    </div>
  </div>
</div>

<script>
  'use strict';

  let ws = null;
  let myUsername = '';
  let activeTarget = 'GLOBAL'; // Inicializa direto na aba Global
  let allOnlineUsers = []; 
  
  // Repositório de Histórico Isolado: armazena as mensagens do 'GLOBAL' e de cada usuário individualmente
  const chatHistories = {
    'GLOBAL': []
  };

  function sanitize(str, max) {
    if (typeof str !== 'string') return '';
    let clean = str.replace(/[\u0000-\u0008\u000B\u000C\u000E-\u001F\u007F]/g, '').trim();
    return max ? clean.slice(0, max) : clean;
  }

  function initWebSocket(proposedNick) {
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(protocol + '//' + window.location.host);

    ws.onopen = function() {
      ws.send(JSON.stringify({ type: 'login', nick: proposedNick }));
    };

    ws.onerror = function() { document.getElementById('statusText').textContent = 'Erro de rede.'; };
    ws.onclose = function() { document.getElementById('statusText').textContent = 'Desconectado.'; };

    ws.onmessage = function(event) {
      let payload;
      try { payload = JSON.parse(event.data); } catch(_) { return; }

      // 1. CONFIRMAÇÃO DE LOGIN
      if (payload.type === 'login_response') {
        if (payload.success) {
          myUsername = payload.nick;
          document.getElementById('screenJoin').classList.add('hidden');
          document.getElementById('screenFeed').classList.remove('hidden');
          document.getElementById('statusText').textContent = 'Online: ' + myUsername;
          switchTarget('GLOBAL'); // Abre o Feed Global como padrão inicial
        } else {
          document.getElementById('loginError').textContent = payload.reason;
          ws.close();
        }
        return;
      }

      // 2. LISTA DE USUÁRIOS ONLINE
      if (payload.type === 'user_list') {
        allOnlineUsers = payload.users.filter(u => u !== myUsername);
        renderUserList();
        return;
      }

      // 3. RECEBIMENTO DE MENSAGEM DO FEED GLOBAL
      if (payload.type === 'global_msg_receive') {
        const fromUser = payload.from;
        const text = sanitize(payload.text, 1500);

        const isMe = fromUser === myUsername;
        chatHistories['GLOBAL'].push({ from: fromUser, text: text, className: isMe ? 'me' : 'them global-type' });

        if (activeTarget === 'GLOBAL') {
          appendMessageToDOM(fromUser, text, isMe ? 'me' : 'them global-type');
        } else {
          // Destaca visualmente a aba global se o usuário estiver em uma DM privada
          document.getElementById('tabGlobal').style.borderColor = 'var(--global-color)';
        }
      }

      // 4. RECEBIMENTO DE MENSAGEM PRIVADA
      if (payload.type === 'private_msg_receive') {
        const fromUser = payload.from;
        const text = sanitize(payload.text, 1500);

        if (!chatHistories[fromUser]) chatHistories[fromUser] = [];
        chatHistories[fromUser].push({ from: fromUser, text: text, className: 'them' });

        if (activeTarget === fromUser) {
          appendMessageToDOM(fromUser, text, 'them');
        } else {
          const item = document.getElementById(`useritem-${fromUser}`);
          if (item) item.style.borderColor = 'var(--danger)';
        }
      }
    };
  }

  function renderUserList() {
    const container = document.getElementById('usersContainer');
    const searchTerm = document.getElementById('searchUser').value.toLowerCase().trim();
    container.innerHTML = '';

    const filtered = allOnlineUsers.filter(user => user.toLowerCase().includes(searchTerm));

    filtered.forEach(user => {
      const div = document.createElement('div');
      div.className = 'user-item' + (activeTarget === user ? ' selected' : '');
      div.id = `useritem-${user}`;
      div.textContent = user;
      div.onclick = function() { switchTarget(user); };
      container.appendChild(div);
    });
  }

  // Alterna o foco do chat (Pode receber 'GLOBAL' ou o Nickname de alguém)
  function switchTarget(target) {
    activeTarget = target;
    
    // Reseta destaques visuais das seleções
    document.getElementById('tabGlobal').classList.remove('selected');
    document.querySelectorAll('.user-item').forEach(el => el.classList.remove('selected'));

    if (target === 'GLOBAL') {
      document.getElementById('tabGlobal').classList.add('selected');
      document.getElementById('tabGlobal').style.borderColor = 'var(--green)';
      document.getElementById('chatTargetHeader').textContent = '🌐 FEED GLOBAL (Mensagens Públicas)';
      document.getElementById('msgInput').placeholder = 'Enviar mensagem pública para o feed...';
    } else {
      const currentItem = document.getElementById(`useritem-${target}`);
      if (currentItem) {
        currentItem.classList.add('selected');
        currentItem.style.borderColor = 'transparent';
      }
      document.getElementById('chatTargetHeader').textContent = '🔒 CONVERSA PRIVADA COM: ' + target;
      document.getElementById('msgInput').placeholder = `Enviar DM secreta para ${target}...`;
    }

    // Libera a barra de entrada
    document.getElementById('msgInput').disabled = false;
    document.getElementById('btnSend').disabled = false;

    // Reconstrói a tela com o histórico específico selecionado
    const box = document.getElementById('chatBox');
    box.innerHTML = '';
    
    if (!chatHistories[target]) chatHistories[target] = [];
    
    if (chatHistories[target].length === 0) {
      box.innerHTML = `<div class="msg system">Início do canal histórico com ${target}</div>`;
    } else {
      chatHistories[target].forEach(msg => {
        appendMessageToDOM(msg.from, msg.text, msg.className);
      });
    }
  }

  function appendMessageToDOM(user, text, className) {
    const box = document.getElementById('chatBox');
    const wrapper = document.createElement('div');
    wrapper.className = 'msg ' + className;
    wrapper.innerHTML = '<strong></strong> <span></span>';
    wrapper.querySelector('strong').textContent = user === myUsername ? 'Você: ' : user + ': ';
    wrapper.querySelector('span').textContent = text;
    box.appendChild(wrapper);
    box.scrollTop = box.scrollHeight;
  }

  function sendMessage() {
    const input = document.getElementById('msgInput');
    const text = sanitize(input.value, 1500);
    if (!text || !activeTarget || !ws || ws.readyState !== WebSocket.OPEN) return;

    // Despacha o payload identificando o destinatário ('GLOBAL' ou o Nickname do alvo)
    ws.send(JSON.stringify({
      type: 'chat_message',
      to: activeTarget,
      text: text
    }));

    // Se for privado, adicionamos localmente no histórico (mensagens do feed global voltam via broadcast para o próprio remetente)
    if (activeTarget !== 'GLOBAL') {
      if (!chatHistories[activeTarget]) chatHistories[activeTarget] = [];
      chatHistories[activeTarget].push({ from: myUsername, text: text, className: 'me' });
      appendMessageToDOM(myUsername, text, 'me');
    }

    input.value = '';
  }

  // Eventos de Input/Clicks
  document.getElementById('btnEnter').onclick = function() {
    const nick = sanitize(document.getElementById('usernameInput').value, 20);
    if (!nick) {
      document.getElementById('loginError').textContent = 'Insira um nick válido.';
      return;
    }
    initWebSocket(nick);
  };

  document.getElementById('tabGlobal').onclick = function() { switchTarget('GLOBAL'); };
  document.getElementById('searchUser').oninput = renderUserList;
  document.getElementById('btnSend').onclick = sendMessage;
  document.getElementById('msgInput').onkeydown = function(e) { if (e.key === 'Enter') sendMessage(); };
</script>
</body>
</html>
