<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEA</title>
<style>
  :root {
    --green: #1dc262; --green2: #17a854; --bg: #000; --text: #eaffea; --muted: #6b8f78;
    --danger: #e05a5a; --panel: #0a0a0a; --line: #173b25;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: Arial, Helvetica, sans-serif;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; padding: 20px;
  }
  .app { width: 100%; max-width: 480px; margin-top: 10px; }
  h1 { text-align: center; font-size: 24px; letter-spacing: 3px; margin-bottom: 20px; color: var(--green); }
  .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 18px; margin-bottom: 14px; }
  label { display: block; font-size: 11px; color: var(--green); font-weight: bold; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
  input[type=text] {
    width: 100%; background: #050505; color: var(--green); border: 1px solid var(--line);
    border-radius: 4px; padding: 12px; font-size: 14px; margin-bottom: 6px; font-family: 'Courier New', monospace; outline: none;
  }
  .char-count { font-size: 10px; color: var(--muted); text-align: right; margin-bottom: 14px; }
  .action-btn { width: 100%; background: var(--green); color: #000; border: none; padding: 14px; border-radius: 5px; font-weight: bold; font-size: 15px; cursor: pointer; }
  .action-btn:hover { background: var(--green2); }
  .status { font-size: 12px; color: var(--muted); text-align: center; margin-bottom: 14px; min-height: 16px; font-family: 'Courier New', monospace; }
  .status.err { color: var(--danger); }
  .chat-container { display: flex; flex-direction: column; background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 14px; }
  .chat { height: 350px; overflow-y: auto; display: none; flex-direction: column; gap: 8px; padding-right: 4px; margin-bottom: 14px; }
  .chat::-webkit-scrollbar { width: 4px; }
  .chat::-webkit-scrollbar-thumb { background: var(--line); border-radius: 2px; }
  .msg { max-width: 85%; padding: 8px 12px; border-radius: 8px; font-size: 13.5px; word-wrap: break-word; line-height: 1.4; }
  .msg.me { align-self: flex-end; background: var(--green); color: #000; }
  .msg.them { align-self: flex-start; background: var(--line); color: var(--green); }
  .send-row { display: none; gap: 8px; }
  .send-btn { background: var(--green); color: #000; border: none; padding: 0 16px; border-radius: 4px; font-weight: bold; cursor: pointer; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="app">
  <h1>PEA</h1>

  <div id="screenJoin">
    <div class="panel">
      <label>SEU NICKNAME</label>
      <input type="text" id="usernameInput" maxlength="25" placeholder="Digite seu nickname aqui...">
      <div class="char-count" id="charCount">0/25</div>
    </div>
    <button class="action-btn" id="btnEnter">Entrar</button>
  </div>

  <div id="screenFeed" class="hidden">
    <div class="status" id="statusText">Conectando...</div>
    <div class="chat-container">
      <div class="chat" id="chatBox"></div>
      <div class="send-row" id="sendRow">
        <input type="text" id="msgInput" maxlength="2000" placeholder="Escreva uma mensagem...">
        <button class="send-btn" id="btnSend">Enviar</button>
      </div>
    </div>
  </div>
</div>

<script>
  'use strict';

  let ws = null;
  let myUsername = '';

  function sanitize(str, max) {
    if (typeof str !== 'string') return '';
    let clean = str.replace(/[\u0000-\u0008\u000B\u000C\u000E-\u001F\u007F]/g, '').trim();
    return max ? clean.slice(0, max) : clean;
  }

  function initWebSocket() {
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = protocol + '//' + window.location.host;

    ws = new WebSocket(wsUrl);

    ws.onopen = function() {
      document.getElementById('statusText').textContent = 'Conectado.';
      document.getElementById('chatBox').style.display = 'flex';
      document.getElementById('sendRow').style.display = 'flex';
    };

    ws.onerror = function() {
      document.getElementById('statusText').textContent = 'Erro de conexão.';
    };

    ws.onclose = function() {
      document.getElementById('statusText').textContent = 'Conexão encerrada.';
      document.getElementById('sendRow').style.display = 'none';
    };

    ws.onmessage = function(event) {
      let payload;
      try { payload = JSON.parse(event.data); } catch(_) { return; }

      if (payload && payload.type === 'feed_broadcast' && payload.data) {
        printMessage(sanitize(payload.data.user, 25), sanitize(payload.data.text, 2000), 'them');
      }
    };
  }

  function printMessage(user, text, className) {
    const box = document.getElementById('chatBox');
    if (!box) return;
    const wrapper = document.createElement('div');
    wrapper.className = 'msg ' + className;
    wrapper.innerHTML = '<strong></strong> <span></span>';
    wrapper.querySelector('strong').textContent = user ? user + ': ' : '';
    wrapper.querySelector('span').textContent = text;
    box.appendChild(wrapper);
    box.scrollTop = box.scrollHeight;
  }

  function sendBroadcast() {
    const input = document.getElementById('msgInput');
    const text = sanitize(input.value, 2000);
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

    ws.send(JSON.stringify({
      type: 'feed_message',
      data: { user: myUsername, text: text }
    }));

    printMessage(myUsername, text, 'me');
    input.value = '';
  }

  // Monitorar input de texto do apelido
  document.getElementById('usernameInput').oninput = function(e) {
    const val = sanitize(e.target.value, 25);
    e.target.value = val;
    document.getElementById('charCount').textContent = val.length + '/25';
  };

  // Evento definitivo do clique do botão entrar
  document.getElementById('btnEnter').onclick = function() {
    const nameVal = document.getElementById('usernameInput').value;
    myUsername = sanitize(nameVal, 25) || 'Anon_' + Math.floor(Math.random() * 9000 + 1000);

    document.getElementById('screenJoin').classList.add('hidden');
    document.getElementById('screenFeed').classList.remove('hidden');

    initWebSocket();
  };

  document.getElementById('btnSend').onclick = sendBroadcast;
  document.getElementById('msgInput').onkeydown = function(e) {
    if (e.key === 'Enter') sendBroadcast();
  };
</script>
</body>
</html>
